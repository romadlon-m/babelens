<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Babelens News Search</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

  <h2>Babelens News Search</h2>

  <div class="toolbar">

    <input
      id="keyword"
      placeholder="Search keyword"
    >

    <button onclick="search(1)">
      Search
    </button>

  </div>

  <div id="meta"></div>

  <div id="result"></div>

  <div id="pager"></div>

  <script src="script.js"></script>

</body>
</html>
